name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload the archives
      id-token: write # mint the OIDC token that signs the attestation
      attestations: write # write the build provenance attestation
      artifact-metadata: write # create the artifact storage record
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Derive version
        id: meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          pkg_version="$(bun pm pkg get version | tr -d '"')"
          if [[ "$version" != "$pkg_version" ]]; then
            echo "tag $tag ($version) does not match package.json version $pkg_version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release archives
        run: |
          set -euo pipefail
          mkdir -p dist
          targets=(
            "darwin amd64 bun-darwin-x64"
            "darwin arm64 bun-darwin-arm64"
            "linux amd64 bun-linux-x64"
            "linux arm64 bun-linux-arm64"
          )
          for entry in "${targets[@]}"; do
            read -r os arch bun_target <<< "$entry"
            echo "::group::cctop_${os}_${arch}"
            stage="$(mktemp -d)"
            bun build cctop.ts --compile --target="$bun_target" --outfile "$stage/cctop"
            rm -f .*.bun-build
            cp LICENSE "$stage/"
            tar -C "$stage" -czf "dist/cctop_${os}_${arch}.tar.gz" cctop LICENSE
            rm -rf "$stage"
            echo "::endgroup::"
          done
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum cctop_*.tar.gz > cctop_checksums.txt
          cat cctop_checksums.txt
      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/cctop_checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          set -euo pipefail
          flags=(--title "v${VERSION}" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" "${flags[@]}" dist/*
